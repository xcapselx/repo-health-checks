name: Repo health check request
description: Request a focused repo health check, CI/test triage, or small automation fix.
title: "Repo health check: "
labels:
  - intake
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the request. Do not post secrets, production credentials, customer data, private keys, recovery codes, or private infrastructure details.
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Public repository URL, or say "private repo" without posting private access details.
      placeholder: https://github.com/owner/repo
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is failing or unclear?
      description: Include the command, workflow, test, or automation issue.
      placeholder: npm test fails in CI, GitHub Actions deploy job is flaky, package script is unclear...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should happen instead?
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Preferred branch
      placeholder: main
    validations:
      required: false
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - Repo Health Snapshot - $79
        - CI/Test Fix Sprint - $149
        - Workflow Automation Upgrade - $299
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Mention anything to avoid. Do not post secret values.
      placeholder: Avoid paid APIs, no production deployment, private service access required...
    validations:
      required: false
  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: Optional
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, private keys, recovery codes, customer data, or production credentials.
          required: true
