name: Repo Health Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run repo health check
        uses: xcapselx/repo-health-checks@v2
        with:
          path: '.'
          fail-on-low-score: 'false'
          output-format: 'markdown'
