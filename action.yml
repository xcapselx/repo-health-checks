name: 'Repo Health Check'
description: 'Run a non-invasive repo health scan on your repository and get a handoff-readiness scorecard'
branding:
  icon: 'check-square'
  color: 'green'
inputs:
  path:
    description: 'Repository path to scan (defaults to current directory)'
    required: false
    default: '.'
  fail-on-low-score:
    description: 'Fail the workflow if the score is below 5 out of 10'
    required: false
    default: 'false'
  output-format:
    description: 'Output format: markdown or json'
    required: false
    default: 'markdown'
runs:
  using: 'composite'
  steps:
    - name: Run repo health check
      shell: bash
      run: |
        python3 "${{ github.action_path }}/health_check_cli.py" "${{ inputs.path }}" ${{ inputs.output-format == 'json' && '--json' || '' }} > repo_health_output.txt
        cat repo_health_output.txt
      env:
        PYTHONIOENCODING: utf-8
    - name: Check score threshold
      if: ${{ inputs.fail-on-low-score == 'true' }}
      shell: bash
      run: |
        SCORE=$(python3 -c "
        import json, sys
        try:
            with open('repo_health_output.txt') as f:
                content = f.read().strip()
            if content.startswith('{'):
                data = json.loads(content)
                print(data.get('score_percent', 0))
            else:
                for line in content.split('\n'):
                    if 'Score:' in line and '%' in line:
                        pct = line.split('(')[1].split('%')[0].strip()
                        print(pct)
                        break
                else:
                    print(0)
        except Exception:
            print(0)
        ")
        echo "Repo health score: $SCORE%"
        if [ "$SCORE" -lt 50 ]; then
          echo "::warning::Repo health score is $SCORE%. Consider improving README, LICENSE, SECURITY.md, CI workflows, tests, dependency lockfiles, and file tree hygiene."
          echo "Free checklist: https://github.com/xcapselx/repo-health-checks/blob/main/README_HEALTH_MINI_CHECKLIST.md"
          echo "Fuller self-serve kit ($29): https://designsy1.gumroad.com/l/toksiz"
          echo "Done-for-you service ($79): https://designsy1.gumroad.com/l/ftgbj"
          exit 1
        fi
    - name: Upload health report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: repo-health-report
        path: repo_health_output.txt
        retention-days: 30
